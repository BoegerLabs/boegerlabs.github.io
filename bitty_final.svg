<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500&amp;display=swap');</style>
  </defs>

  <circle cx="256" cy="256" r="248" fill="#042C53"/>

  <!-- Chip body -->
  <rect x="152" y="122" width="208" height="208" rx="20" fill="#0C447C"/>

  <!-- Pins — top (4 pins) -->
  <rect x="192" y="88"  width="22" height="34" rx="5" fill="#85B7EB"/>
  <rect x="234" y="88"  width="22" height="34" rx="5" fill="#85B7EB"/>
  <rect x="276" y="88"  width="22" height="34" rx="5" fill="#85B7EB"/>
  <rect x="318" y="88"  width="22" height="34" rx="5" fill="#85B7EB"/>

  <!-- Pins — bottom (4 pins) -->
  <rect x="192" y="330" width="22" height="34" rx="5" fill="#85B7EB"/>
  <rect x="234" y="330" width="22" height="34" rx="5" fill="#85B7EB"/>
  <rect x="276" y="330" width="22" height="34" rx="5" fill="#85B7EB"/>
  <rect x="318" y="330" width="22" height="34" rx="5" fill="#85B7EB"/>

  <!-- Pins — left (4 pins) -->
  <rect x="88" y="152" width="34" height="22" rx="5" fill="#85B7EB"/>
  <rect x="88" y="194" width="34" height="22" rx="5" fill="#85B7EB"/>
  <rect x="88" y="236" width="34" height="22" rx="5" fill="#85B7EB"/>
  <rect x="88" y="278" width="34" height="22" rx="5" fill="#85B7EB"/>

  <!-- Pins — right (4 pins) -->
  <rect x="390" y="152" width="34" height="22" rx="5" fill="#85B7EB"/>
  <rect x="390" y="194" width="34" height="22" rx="5" fill="#85B7EB"/>
  <rect x="390" y="236" width="34" height="22" rx="5" fill="#85B7EB"/>
  <rect x="390" y="278" width="34" height="22" rx="5" fill="#85B7EB"/>

  <!-- Inner circle — core -->
  <circle cx="256" cy="226" r="58" fill="#185FA5"/>
  <circle cx="256" cy="226" r="26" fill="#B5D4F4"/>

  <!-- Personality curve — top left of inner circle -->
  <path d="M 226 202 Q 240 190 256 196" fill="none" stroke="#0C447C" stroke-width="5" stroke-linecap="round"/>

  <!-- Bitty label — lower pocket -->
  <text x="256" y="440"
    font-family="Poppins, sans-serif" font-size="42" font-weight="500"
    fill="#B5D4F4" text-anchor="middle">Bitty</text>
</svg>
